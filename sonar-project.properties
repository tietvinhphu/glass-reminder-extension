# SonarCloud project configuration
# Xem project key tại: sonarcloud.io → project → Administration → General Settings
sonar.projectKey=tietvinhphu_glass-reminder-extension
sonar.organization=tietvinhphu
sonar.projectName=Glass Reminder Extension
sonar.projectVersion=0.0.1

# Source và test paths
sonar.sources=src,entrypoints
sonar.tests=tests
sonar.exclusions=node_modules/**,dist/**,.output/**,*.output/**,**/*.d.ts
sonar.test.inclusions=tests/**/*.test.ts,tests/**/*.spec.ts

# TypeScript
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# SonarCloud host
sonar.host.url=https://sonarcloud.io
